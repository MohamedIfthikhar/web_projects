<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
    <div class = "container">
        <div class = "card">
            <img  class = "blog-image" src = "./assets/images/illustration-article.svg" alt = "design image">
            <p class = "blog-tag">Learning</p>
            <p class = "published-date">published 21 Dec 2023</p>

            <h2>HTML and CSS foundations</h2>

            <p class  = "content">
                These languages are the backbone of every 
                website, defining structure,content, and presentation.
            </p>
            <div class = "author">
                <img src="./assets/images/image-avatar.webp" alt="author profile">
                <span>
                    Greg Hopper
                </span>
            </div>
        </div>

    </div>
  
  <footer class="attribution">
    <span class = "frontendmentor">
    Challenge by: <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    </span>
    <span class = "me">
    Coded by: <a href="https://www.linkedin.com/in/mohamed-ifthikhar-1a4588352/?skipRedirect=true" target="_blank">Mohamed Ifthikhar</a>.
    </span>
  </footer>
</body>
</html>
